    function updateUI() {
        const ch = curChar();
        const el = curElement();
        // Player sprite update (Refactored to avoid innerHTML flickering)
        const ps = document.getElementById('playerShape');
        const pImg = document.getElementById('playerImg');
        const pIcon = document.getElementById('playerIcon');
        
        // Skill guide buttons (Hide only during Skill/Ult sequence)
        const isHidingState = ['skill', 'ult_cutin', 'ult_prep', 'ult_strike'].includes(state.lockedBy);
        document.getElementById('guideE').style.display = (!isHidingState && ch && ch.sp >= CFG.SKILL_COST) ? 'flex' : 'none';
        document.getElementById('guideQ').style.display = (!isHidingState && ch && ch.up >= CFG.ULT_COST) ? 'flex' : 'none';
        
        if (ch && ch.type === 'image') {
            let currentImg = ch.img;
            let imgHeight = '100%';
            let custStyle = '';
            
            if (state.lockedBy === 'ult_cutin' && ch.imgUltCutin) {
                // 전용 레이어 보이기
                const layer = document.getElementById('ultCutinLayer');
                const lImg = document.getElementById('ultCutinImg');
                if (lImg.src.indexOf(ch.imgUltCutin) === -1) lImg.src = ch.imgUltCutin;
                
                // 모든 캐릭터 공통: 배경 프레임에 100% 맞춤
                lImg.style.width = '100%';
                
                layer.classList.add('show');
                
                // 아레나 스프라이트 숨김 (가이드는 위에서 통합 관리)
                pImg.style.display = 'none';
                ps.style.display = 'none';
                return; // 컷신 모드일 때는 아래 일반 렌더링 무시
            } else {
                document.getElementById('ultCutinLayer').classList.remove('show');
                ps.style.display = 'flex';
            }

            if (state.lockedBy === 'ult_prep' && ch.imgUltPrep) {
                currentImg = ch.imgUltPrep;
                imgHeight = ch.ultPrepHeight || '211px';
            } else if (state.lockedBy === 'ult_strike' && ch.imgUltStrike) {
                currentImg = ch.imgUltStrike;
                imgHeight = ch.ultStrikeHeight || '345px';
            } else if (state.lockedBy === 'skill' && ch.imgSkill) {
                currentImg = ch.imgSkill;
                imgHeight = ch.skillHeight || '298px';
            } else if (state.lockedBy === 'charged' && ch.imgChargeAtk) {
                currentImg = ch.imgChargeAtk;
                imgHeight = ch.chargeAtkHeight || '302px';
            } else if (state.isHolding && ch.imgChargePrep) {
                currentImg = ch.imgChargePrep;
                imgHeight = ch.chargePrepHeight || '286px';
            } else if (state.lockedBy === 'combo' && ch.imgCombo) {
                const heights = ch.comboHeights || ['250px', '250px', '250px'];
                if (state.combo === 1) { currentImg = ch.imgCombo[0]; imgHeight = heights[0]; }
                else if (state.combo === 2) { currentImg = ch.imgCombo[1]; imgHeight = heights[1]; }
                else if (state.combo === 0) { currentImg = ch.imgCombo[2]; imgHeight = heights[2]; }
            }

            pImg.style.display = 'block';
            pIcon.style.display = 'none';
            if (pImg.src.indexOf(currentImg) === -1) pImg.src = currentImg;
            
            const offset = ch.offsetX !== undefined ? ch.offsetX : -50;
            if (custStyle) {
                pImg.style.cssText = custStyle;
            } else {
                pImg.style.cssText = `height: ${imgHeight}; width: auto; position: absolute; bottom: 0; left: ${offset}px; pointer-events: none; opacity: 1;`;
                if (state.lockedBy) pImg.classList.add('glow-pulse');
                else pImg.classList.remove('glow-pulse');
            }
            
            ps.style.background = 'none';
            ps.style.clipPath = 'none';
            ps.style.boxShadow = 'none';
        } else if (ch) {
            pImg.style.display = 'none';
            pIcon.style.display = 'block';
            pIcon.textContent = ELEMENTS[el].icon;
            ps.style.background = `linear-gradient(135deg, ${elColor(el)}cc, ${elColor(el)}66)`;
            ps.style.boxShadow = `0 0 20px ${elColor(el)}44`;
            ps.style.clipPath = 'polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)';
            ps.style.width = '80px';
            ps.style.height = '92px';
            ps.style.filter = 'none';
        }

        if (ch) {
            document.getElementById('playerName').textContent = ch.id || `${ELEMENTS[el].name} 캐릭터`;
            document.getElementById('playerName').style.color = elColor(el);
            document.getElementById('playerElement').textContent = ELEMENTS[el].icon;
        }
        
        // Enemy sprite update (Refactored to avoid innerHTML flickering)
        const enemy = state.enemy;
        document.getElementById('enemyHpFill').style.width = `${(enemy.hp / enemy.maxHp) * 100}%`;
        document.getElementById('enemyHpText').textContent = `${Math.floor(enemy.hp).toLocaleString()} / ${enemy.maxHp.toLocaleString()}`;
        
        const es = document.getElementById('enemyShape');
        const eImg = document.getElementById('enemyImg');
        const eInner = document.getElementById('enemyInner');
        
        let esFilter = 'none';
        let esOutline = 'none';
        
        if (enemy.frozen) { 
            esFilter = 'drop-shadow(0 0 15px #38bdf8) brightness(1.2)'; 
            esOutline = '3px solid #7dd3fc'; 
        } else if (enemy.chaos) { 
            // 허수아비 자체의 색 변환 대신 장판 효과에 집중하기 위해 아웃라인 제거 (요청사항 반영)
            esFilter = 'none'; 
            esOutline = 'none'; 
        }

        // Add additional glows/shadows
        let esShadow = 'none';
        if (enemy.glossReady) {
            esShadow = `drop-shadow(0 0 10px #fcd34d) drop-shadow(0 0 20px #f59e0b99)`;
        } else if (enemy.stacks.length > 0) {
            const mainEl = enemy.stacks[0].element;
            esShadow = `drop-shadow(0 0 10px ${elColor(mainEl)}99)`;
        } else if (enemy.defDown) {
            esShadow = 'drop-shadow(0 0 10px #6366f1)';
        }
        
        const finalFilter = (esFilter === 'none' ? '' : esFilter + ' ') + (esShadow === 'none' ? 'drop-shadow(0 10px 15px rgba(0,0,0,0.5))' : esShadow);
        eImg.style.filter = finalFilter;
        es.style.outline = esOutline;
        es.style.outlineOffset = '4px';

        eInner.textContent = enemy.frozen ? '❄️ FROZEN' : enemy.chaos ? '🌀 CHAOS' : (enemy.glossReady ? '✨ GLOSS READY' : 'ENEMY');
        eInner.style.color = enemy.frozen ? '#7dd3fc' : (enemy.chaos ? '#f43f5e' : (enemy.glossReady ? '#fbbf24' : '#fff'));
        // Status tray update (Surgical update to avoid flickering)
        const tray = document.getElementById('statusTray');
        const currentElements = enemy.stacks.map(s => s.element);
        if (enemy.chaos) currentElements.push('chaos');
        
        // 부착된 속성이 없으면 트레이 숨김
        tray.style.display = currentElements.length === 0 ? 'none' : 'flex';

        // Remove old badges
        Array.from(tray.children).forEach(badge => {
            if (!currentElements.includes(badge.dataset.element)) {
                badge.remove();
            }
        });

        // Update or create badges
        enemy.stacks.forEach(s => {
            let badge = tray.querySelector(`[data-element="${s.element}"]`);
            if (!badge) {
                badge = document.createElement('div');
                badge.className = 'status-badge';
                badge.dataset.element = s.element;
                badge.style.background = elColor(s.element);
                badge.style.color = (s.element === 'light' || s.element === 'ice') ? '#000' : '#fff';
                badge.innerHTML = `${elName(s.element)}<div class="gauge-bar"><div class="gauge-val"></div><div class="gauge-fill"></div></div>`;
                tray.appendChild(badge);
            }
            badge.querySelector('.gauge-val').textContent = s.gauge.toFixed(1);
            badge.querySelector('.gauge-fill').style.width = `${(s.gauge / 5) * 100}%`;
            badge.querySelector('.gauge-fill').style.background = elColor(s.element);
        });

        if (enemy.chaos && !tray.querySelector('[data-element="chaos"]')) {
            let badge = document.createElement('div');
            badge.className = 'status-badge';
            badge.dataset.element = 'chaos';
            badge.style.background = 'var(--chaos)';
            badge.textContent = '혼돈';
            tray.appendChild(badge);
        }
        // SP/UP
        document.getElementById('spFill').style.width = `${(ch.sp / CFG.SP_MAX) * 100}%`;
        document.getElementById('upFill').style.width = `${(ch.up / CFG.UP_MAX) * 100}%`;
        document.getElementById('spVal').textContent = `${ch.sp} / ${CFG.SP_MAX}`;
        document.getElementById('upVal').textContent = `${ch.up} / ${CFG.UP_MAX}`;
        document.getElementById('keyE').classList.toggle('disabled', ch.sp < CFG.SKILL_COST);
        document.getElementById('keyQ').classList.toggle('disabled', ch.up < CFG.ULT_COST);
        // Combo
        document.getElementById('comboNum').textContent = state.combo;
        document.getElementById('comboNum').style.color = state.combo > 0 ? elColor(el) : 'var(--physical)';
        // Char slots
        document.querySelectorAll('.char-slot').forEach((slot, i) => {
            if (i >= state.characters.length) return;
            const c = state.characters[i];
            const isE = c.sp >= CFG.SKILL_COST;
            const isQ = c.up >= CFG.ULT_COST;
            slot.classList.toggle('active', i === state.activeChar);
            if (isQ) {
                slot.style.background = '#f59e0b'; slot.style.color = '#111'; slot.style.borderColor = '#f59e0b';
            } else if (isE) {
                slot.style.background = '#10b981'; slot.style.color = '#fff'; slot.style.borderColor = '#10b981';
            } else {
                slot.style.background = 'transparent'; slot.style.color = elColor(c.element);
                slot.style.borderColor = (i === state.activeChar) ? elColor(c.element) : 'var(--border)';
            }
        });
        // Battle stats
        const statsEl = document.getElementById('attachStats');
        if (enemy.totalDmgSinceStart > 0) {
            statsEl.style.opacity = '1';
            const elapsed = Math.max(1, (Date.now() - enemy.combatStartTime) / 1000);
            document.getElementById('attachDps').textContent = Math.round(enemy.totalDmgSinceStart / elapsed).toLocaleString();
            document.getElementById('hiSingleDmg').textContent = enemy.maxSingleDmg.toLocaleString();
            document.getElementById('hiRxName').textContent = enemy.maxRxName || '-';
            document.getElementById('hiRxDmg').textContent = enemy.maxRxDmg.toLocaleString();
        } else {
            statsEl.style.opacity = '0';
        }
        // Matrix highlight
        updateMatrixHighlights();
    }

    function updateMatrixHighlights() {
        const hostEls = state.enemy.stacks.map(s => s.element);
        if (state.enemy.chaos) hostEls.push('chaos');
        // 활성 영역도 Host로 포함
        for (const zone of state.zones) {
            if (!hostEls.includes(zone.element)) hostEls.push(zone.element);
        }
        document.querySelectorAll('.rx-card').forEach(card => {
            const rxId = card.dataset.rx;
            const rx = REACTIONS.find(r => r.id === rxId);
            if (!rx) return;
            let possible = false;
            for (const h of hostEls) {
                if (findReaction(h, curElement())?.id === rxId) possible = true;
            }
            card.classList.toggle('possible', possible);
        });
    }

    // ======== INIT UI ========
    function initCharSlots() {
        const container = document.getElementById('charSlots');
        container.innerHTML = '';
        state.characters.forEach((c, i) => {
            const el = c.element;
            const slot = document.createElement('div');
            slot.className = 'char-slot';
            slot.style.color = elColor(el);
            slot.innerHTML = `${ELEMENTS[el].icon}<span class="key-hint">${i + 1}</span>`;
            slot.onclick = () => switchChar(i);
            container.appendChild(slot);
        });
    }

    function initMatrix() {
        const body = document.getElementById('matrixBody');
        REACTIONS.forEach(rx => {
            const card = document.createElement('div');
            card.className = 'rx-card';
            card.dataset.rx = rx.id;
            let formula = '';
            if (rx.a === '_elem4') formula = `원소4종 + ${elName(rx.b)}`;
            else if (rx.b === '_elem4') formula = `${rx.a === '_chaos' ? '혼돈' : elName(rx.a)} + 원소4종`;
            else formula = `${elName(rx.a)} ↔ ${elName(rx.b)}`;
            card.innerHTML = `<span class="rx-priority">P${rx.prio}</span>
                <div class="rx-name" style="color:${rx.color}">${rx.name} (${rx.nameEn})</div>
                <div class="rx-formula">${formula}</div>
                <div class="rx-effect">${rx.effect}</div>`;
            body.appendChild(card);
        });
    }

    function switchChar(idx) {
        state.activeChar = idx;
        state.combo = 0;
        // 교체 중 콤보/강공격 잠금은 해제 (스킬/궁극기는 유지)
        if (state.lockedBy === 'combo' || state.lockedBy === 'charged') {
            state.lockedBy = null;
            clearTimeout(state.lockTimer);
        }
        addLog(`캐릭터 교체: ${elName(curElement())}`, 'system');
        updateUI();
    }

    function startGame() {
        const el1 = document.getElementById('slot1').value;
        const el2 = document.getElementById('slot2').value;
        const el3 = document.getElementById('slot3').value;
        state.characters = [
            { id: 'PC_01', type: 'image', offsetX: -50, img: 'media/PC_01.png', imgCombo: ['media/PC_01_atk1.png', 'media/PC_01_atk2.png', 'media/PC_01_atk3.png'], comboHeights: ['200px', '225px', '225px'], imgChargePrep: 'media/PC_01_charge_prep.png', imgChargeAtk: 'media/PC_01_charge_atk.png', chargePrepHeight: '286px', chargeAtkHeight: '302px', imgSkill: 'media/PC_01_skill.png', skillHeight: '298px', imgUltCutin: 'media/PC_01_ult_cutin.png', imgUltPrep: 'media/PC_01_ult_prep.png', imgUltStrike: 'media/PC_01_ult_strike.png', ultPrepHeight: '211px', ultStrikeHeight: '345px', element: el1, sp: 0, up: 0 },
            { id: 'PC_02', type: 'image', offsetX: -75, img: 'media/PC_02.png', imgCombo: ['media/PC_02_atk1.png', 'media/PC_02_atk2.png', 'media/PC_02_atk3.png'], comboHeights: ['250px', '250px', '250px'], imgChargePrep: 'media/PC_02_charge_prep.png', imgChargeAtk: 'media/PC_02_charge_atk.png', chargePrepHeight: '250px', chargeAtkHeight: '250px', imgSkill: 'media/PC_02_skill.png', skillHeight: '375px', imgUltCutin: 'media/PC_02_ult_cutin.png', imgUltPrep: 'media/PC_02_ult_prep.png', imgUltStrike: 'media/PC_02_ult_strike.png', ultPrepHeight: '280px', ultStrikeHeight: '280px', element: el2, sp: 0, up: 0 },
            { id: 'PC_03', type: 'image', offsetX: -75, img: 'media/PC_03.png', imgCombo: ['media/PC_03_atk1.png', 'media/PC_03_atk2.png', 'media/PC_03_atk3.png'], comboHeights: ['250px', '303px', '372px'], imgChargePrep: 'media/PC_03_charge_prep.png', chargePrepHeight: '271px', imgChargeAtk: 'media/PC_03_charge_atk.png', chargeAtkHeight: '397px', imgSkill: 'media/PC_03_skill.png', skillHeight: '377px', imgUltCutin: 'media/PC_03_ult_cutin.png', imgUltPrep: 'media/PC_03_ult_prep.png', imgUltStrike: 'media/PC_03_ult_strike.png', ultPrepHeight: '377px', ultStrikeHeight: '435px', element: el3, sp: 0, up: 0 }
        ];
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('appContainer').style.display = 'flex';
        initCharSlots();
        state.activeChar = 0;
        state.enemy.hp = CFG.ENEMY_HP;
        state.enemy.stacks = [];
        state.enemy.frozen = false; state.enemy.chaos = false;
        state.enemy.defDown = false;
        state.enemy.maxSingleDmg = 0; state.enemy.maxRxDmg = 0; state.enemy.maxRxName = '';
        state.enemy.totalDmgSinceStart = 0; state.enemy.combatStartTime = Date.now();
        state.enemy.glossReady = false;
        stopSpRegen();
        state.combo = 0;
        state.zones.forEach(z => z.el?.remove());
        state.zones = [];
        document.getElementById('logBody').innerHTML = '';
        addLog('파티 편성 완료. 전투를 시작합니다!', 'system');
        addLog('마우스 좌클릭: 물리 공격 | 홀드: 강공격', 'system');
        addLog('E: 속성 스킬 | Q: 궁극기 | 1~3: 캐릭터 교체', 'system');
        updateUI();
    }

    function resetAll() {
        document.getElementById('setupScreen').style.display = 'flex';
        document.getElementById('appContainer').style.display = 'none';
    }

    // ======== INPUT HANDLING ========
    function setupInput() {
        const arena = document.getElementById('arenaMain');
        arena.addEventListener('mousedown', e => {
            if (e.button !== 0 || state.lockedBy !== null) return;
            state.mouseDownTime = Date.now();
            state.isHolding = true;
            updateUI();
            state.isCharging = false;
            state.chargeInterval = setInterval(() => {
                const elapsed = Date.now() - state.mouseDownTime;
                const pct = clamp((elapsed / CFG.CHARGE_TIME) * 100, 0, 100);
                document.getElementById('chargeFill').style.width = `${pct}%`;
                if (elapsed >= CFG.CHARGE_TIME) state.isCharging = true;
            }, 30);
        });
        arena.addEventListener('mouseup', e => {
            if (e.button !== 0) return;
            clearInterval(state.chargeInterval);
            document.getElementById('chargeFill').style.width = '0%';
            if (state.isHolding) {
                state.isHolding = false;
                updateUI();
            }
            if (state.lockedBy !== null) {
                state.isCharging = false;
                return;
            }
            if (state.isCharging) {
                doChargedAttack();
            } else {
                doComboAttack();
            }
            state.isCharging = false;
        });
        arena.addEventListener('mouseleave', () => {
            clearInterval(state.chargeInterval);
            document.getElementById('chargeFill').style.width = '0%';
            state.isCharging = false;
            if (state.isHolding) {
                state.isHolding = false;
                updateUI();
            }
        });
        document.addEventListener('keydown', e => {
            if (e.repeat) return;
            const k = e.key.toLowerCase();
            const lck = state.lockedBy;

            // UI 제어 (상태 잠금과 무관)
            if (k === 'l' || k === 'ㅣ') { togglePanel('log'); return; }
            if (k === 'm' || k === 'ㅡ') { togglePanel('matrix'); return; }

            // 전투 제어
            if (lck && lck !== 'combo' && lck !== 'charged') return; 
            
            if (k >= '1' && k <= '6') {
                const idx = parseInt(k) - 1;
                if (idx < state.characters.length) switchChar(idx);
            }
            else if (k === 'e' || k === 'ㄷ') {
                doSkill();
            }
            else if (k === 'q' || k === 'ㅂ') {
                doUltimate();
            }
        });
        arena.addEventListener('contextmenu', e => e.preventDefault());
    }

    function startSpRegen() {
        if (state.spRegenInterval) return;
        addLog('전투 개시: SP 자동 회복 활성화 (1/sec)', 'system');
        state.spRegenInterval = setInterval(() => {
            state.characters.forEach(c => {
                c.sp = clamp(c.sp + 1, 0, CFG.SP_MAX);
            });
            updateUI();
        }, 1000);
    }

    function stopSpRegen() {
        if (state.spRegenInterval) {
            clearInterval(state.spRegenInterval);
            state.spRegenInterval = null;
            addLog('전투 종료: SP 자동 회복 일시 정지', 'system');
        }
    }

    function triggerFlashDamage() {
        const enemy = state.enemy;
        enemy.glossReady = false;
        
        const flashDmg = calcDamage(500); // 섬광 고유 피해
        applyDamage(flashDmg);
        
        // 섬광(Flash) 통계 갱신
        if (flashDmg > enemy.maxRxDmg) {
            enemy.maxRxDmg = flashDmg;
            enemy.maxRxName = '섬광';
        }
        
        showPopup(`✨ 섬광! ${flashDmg}`, '#fcd34d', 'big', 'reaction');
        addLog(`광채 섬광 발동: ${flashDmg} 추가 속성 피해!`, 'reaction');
        
        // 화면 발광 연출
        const app = document.body;
        app.style.animation = 'none'; void app.offsetWidth;
        app.style.animation = 'glossFlash 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)';
        
        // 섬광용 대량의 황금 파티클
        const container = document.getElementById('arenaMain');
        const enemyObj = document.getElementById('enemyShape');
        const eRect = enemyObj.getBoundingClientRect();
        const aRect = container.getBoundingClientRect();
        const cx = eRect.left - aRect.left + eRect.width / 2;
        const cy = eRect.top - aRect.top + eRect.height / 2;

        for (let i = 0; i < 50; i++) {
            const pt = document.createElement('div');
            pt.className = 'particle';
            const s = 10 + Math.random() * 30;
            pt.style.cssText = `width:${s}px;height:${s}px;background:#fcd34d;box-shadow:0 0 25px gold;left:${cx}px;top:${cy}px;`;
            const angle = Math.random() * Math.PI * 2;
            const dist = 150 + Math.random() * 150;
            const tx = Math.cos(angle) * dist;
            const ty = Math.sin(angle) * dist;
            pt.animate([
                { transform: 'translate(-50%, -50%) scale(2)', opacity: 1 },
                { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
            ], { duration: 1000, easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)', fill: 'forwards' });
            container.appendChild(pt);
            setTimeout(() => pt.remove(), 1100);
        }
        spawnReactionEffect({ color: '#fcd34d' });
    }

    function triggerInfusionGlow(el) {
        const container = document.getElementById('enemyContainer');
        const overlay = document.createElement('div');
        overlay.className = 'infusion-flash-overlay';
        overlay.style.background = `radial-gradient(circle, ${elColor(el)} 0%, transparent 70%)`;
        overlay.style.animation = 'infusionFlash 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
        container.appendChild(overlay);
        setTimeout(() => overlay.remove(), 600);
    }

    function spawnReactionEffect(rx) {
        const container = document.getElementById('arenaMain');
        const enemyObj = document.getElementById('enemyShape');
        const color = rx.color;
        const eRect = enemyObj.getBoundingClientRect();
        const aRect = container.getBoundingClientRect();
        const cx = eRect.left - aRect.left + eRect.width / 2;
        const cy = eRect.top - aRect.top + eRect.height / 2;
        
        // 반응용 화려한 폭발 파티클
        for (let i = 0; i < 25; i++) {
            const pt = document.createElement('div');
            pt.className = 'particle';
            const s = 15 + Math.random() * 20;
            pt.style.cssText = `width:${s}px;height:${s}px;background:${color};box-shadow:0 0 20px ${color};left:${cx}px;top:${cy}px;position:absolute;border-radius:50%;pointer-events:none;z-index:41;mix-blend-mode:screen;`;
            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 100;
            const tx = Math.cos(angle) * dist;
            const ty = Math.sin(angle) * dist;
            pt.animate([
                { transform: 'translate(-50%, -50%) scale(1.5)', opacity: 1 },
                { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
            ], { duration: 800, easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)', fill: 'forwards' });
            container.appendChild(pt);
            setTimeout(() => pt.remove(), 900);
        }
        shakeScreen();
    }

    function shakeScreen() {
        const app = document.getElementById('arena');
        app.style.animation = 'none'; void app.offsetWidth;
        app.style.animation = 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both';
    }

    function shakeEnemy() {
        const es = document.getElementById('enemyShape');
        es.classList.remove('enemy-shaking');
        void es.offsetWidth;
        es.classList.add('enemy-shaking');
    }

    function shakeEnemyDeath() {
        const es = document.getElementById('enemyShape');
        es.classList.remove('enemy-shaking');
        es.classList.add('enemy-dying');
    }

    // ======== BOOT ========
    function init() {
        initMatrix();
        setupInput();
        startGaugeDecay();
    }
    init();
    </script>
    </div>
</body>
</html>
