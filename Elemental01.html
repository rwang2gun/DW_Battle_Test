<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>속성 반응 시스템 프로토타입</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1115; --panel: rgba(22,25,30,0.92); --border: rgba(255,255,255,0.07);
            --text: #f3f4f6; --muted: #8c92a1; --dim: #4b5563;
            --fire: #e11d48; --water: #2563eb; --thunder: #7c3aed;
            --ice: #60a5fa; --light: #fcd34d; --dark: #6b7280;
            --chaos: #9f1239; --physical: #9ca3af;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Pretendard',sans-serif;
            height:100vh; display:flex; flex-direction:column; overflow:hidden; user-select:none;
            background-image:radial-gradient(ellipse at 20% 0%,rgba(40,45,55,.6) 0%,transparent 50%),
                             radial-gradient(ellipse at 80% 100%,rgba(30,20,35,.5) 0%,transparent 50%); }

        /* === TOP BAR === */
        .top-bar { display:flex; align-items:center; justify-content:space-between;
            padding:10px 24px; border-bottom:1px solid var(--border); background:var(--panel);
            backdrop-filter:blur(12px); z-index:10; flex-shrink:0; height:52px; }
        .top-bar h1 { font-size:1rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; }
        .top-bar h1 span { color:var(--fire); }
        .char-slots { display:flex; gap:6px; }
        .char-slot { width:36px; height:36px; border-radius:6px; border:2px solid var(--border);
            display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:800;
            cursor:pointer; transition:all .15s; position:relative; opacity:.5; }
        .char-slot:hover { opacity:.8; transform:translateY(-2px); }
        .char-slot.active { opacity:1; border-color:currentColor; box-shadow:0 0 12px currentColor; }
        .char-slot .key-hint { position:absolute; top:-6px; right:-4px; font-size:.55rem;
            background:rgba(0,0,0,.7); padding:1px 3px; border-radius:3px; color:var(--muted); }
        .top-btns { display:flex; gap:8px; }
        .top-btns button { background:rgba(255,255,255,.05); border:1px solid var(--border);
            color:var(--muted); padding:6px 14px; border-radius:6px; font-family:inherit;
            font-size:.75rem; font-weight:600; cursor:pointer; transition:all .15s; }
        .top-btns button:hover { background:rgba(255,255,255,.1); color:#fff; }

        /* === MAIN LAYOUT === */
        .main { display:flex; flex:1; overflow:hidden; }

        /* LEFT: Combat Log */
        .log-panel { width:260px; border-right:1px solid var(--border); background:var(--panel);
            display:flex; flex-direction:column; flex-shrink:0; }
        .log-header { padding:12px 16px; border-bottom:1px solid var(--border);
            font-size:.75rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
        .log-body { flex:1; overflow-y:auto; padding:8px 12px; display:flex; flex-direction:column; gap:3px; }
        .log-body::-webkit-scrollbar { width:4px; }
        .log-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }
        .log-entry { font-size:.72rem; padding:4px 8px; border-radius:4px; background:rgba(255,255,255,.02);
            line-height:1.4; border-left:2px solid var(--dim); }
        .log-entry .time { color:var(--dim); margin-right:6px; }
        .log-entry.reaction { border-left-color:var(--fire); background:rgba(225,29,72,.05); }
        .log-entry.damage { border-left-color:var(--muted); }
        .log-entry.system { border-left-color:var(--water); background:rgba(37,99,235,.05); }

        /* CENTER: Arena */
        .arena { flex:1; display:flex; flex-direction:column; position:relative; overflow:hidden; }
        .arena-bg { position:absolute; inset:0;
            background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,.008) 20px,rgba(255,255,255,.008) 40px); }
        .arena-main { flex:1; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; cursor:crosshair; }

        /* Character Shapes */
        .shape-container { position:relative; display:flex; flex-direction:column; align-items:center; }
        .shape { transition:filter .2s, transform .2s; position:relative; }
        .player-shape { width:80px; height:92px; clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
            display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:900; }
        .enemy-shape { width:120px; height:120px; border-radius:12px; transform:rotate(45deg);
            display:flex; align-items:center; justify-content:center; position:relative; }
        .enemy-shape .inner { transform:rotate(-45deg); font-size:.9rem; font-weight:800; text-align:center; }
        .enemy-hp-bar { width:140px; height:6px; background:rgba(255,255,255,.1); border-radius:3px; margin-top:12px; overflow:hidden; }
        .enemy-hp-fill { height:100%; background:linear-gradient(90deg,#ef4444,#f97316); border-radius:3px; transition:width .3s; }
        .enemy-hp-text { font-size:.65rem; color:var(--muted); margin-top:4px; text-align:center; }

        /* Status Tray on Enemy */
        .status-tray { position:absolute; top:-40px; left:50%; transform:translateX(-50%);
            display:flex; gap:4px; padding:4px 8px; background:rgba(0,0,0,.6); border-radius:12px;
            min-width:40px; justify-content:center; z-index:20; }
        .status-badge { width:28px; height:28px; border-radius:50%; display:flex; align-items:center;
            justify-content:center; font-size:.55rem; font-weight:900; color:#fff;
            box-shadow:0 0 8px currentColor; animation:popIn .3s cubic-bezier(.2,.8,.2,1); }
        .gauge-bar { position:absolute; bottom:-2px; left:2px; right:2px; height:3px;
            border-radius:1px; background:rgba(0,0,0,.5); overflow:hidden; }
        .gauge-fill { height:100%; border-radius:1px; transition:width .1s linear; }

        /* Damage Popups */
        .dmg-popup { position:absolute; font-weight:900; white-space:nowrap; pointer-events:none;
            text-shadow:0 2px 8px rgba(0,0,0,.8),1px 1px 0 #000; z-index:50;
            animation:floatUp 1s cubic-bezier(.2,.8,.2,1) forwards; }
        .dmg-popup.big { font-size:2rem; }
        .dmg-popup.normal { font-size:1.3rem; }
        .dmg-popup.info { font-size:.85rem; }

        /* Zone Overlay */
        .zone-overlay { position:absolute; border-radius:50%; opacity:0; pointer-events:none;
            animation:zoneAppear .5s forwards; z-index:5; }
        .zone-timer { position:absolute; top:-20px; left:50%; transform:translateX(-50%);
            font-size:.65rem; font-weight:800; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.8); }

        /* Versus divider */
        .vs-divider { font-size:1.5rem; font-weight:900; color:var(--dim); margin:0 60px; letter-spacing:4px; }

        /* RIGHT: Reaction Matrix */
        .matrix-panel { width:280px; border-left:1px solid var(--border); background:var(--panel);
            display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; }
        .matrix-header { padding:12px 16px; border-bottom:1px solid var(--border);
            font-size:.75rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
        .matrix-body { padding:12px; display:flex; flex-direction:column; gap:6px; flex:1; overflow-y:auto; }
        .matrix-body::-webkit-scrollbar { width:4px; }
        .matrix-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }
        .rx-card { padding:8px 10px; border-radius:6px; background:rgba(255,255,255,.02);
            border:1px solid transparent; transition:all .2s; }
        .rx-card.possible { border-color:rgba(255,255,255,.15); background:rgba(255,255,255,.05); }
        .rx-card.active { border-color:var(--fire); background:rgba(225,29,72,.08); animation:pulseGlow .6s; }
        .rx-card .rx-name { font-size:.8rem; font-weight:800; }
        .rx-card .rx-formula { font-size:.65rem; color:var(--muted); margin-top:2px; }
        .rx-card .rx-effect { font-size:.65rem; color:var(--dim); margin-top:2px; }
        .rx-card .rx-priority { font-size:.55rem; font-weight:800; padding:1px 5px; border-radius:3px;
            background:rgba(255,255,255,.08); color:var(--muted); float:right; }

        /* === BOTTOM HUD === */
        .hud { display:flex; align-items:center; justify-content:center; gap:32px;
            padding:12px 24px; border-top:1px solid var(--border); background:var(--panel);
            backdrop-filter:blur(12px); flex-shrink:0; height:72px; }
        .hud-controls { display:flex; gap:12px; align-items:center; }
        .hud-key { display:flex; flex-direction:column; align-items:center; gap:2px; }
        .hud-key .key { width:36px; height:28px; border-radius:4px; border:1px solid var(--border);
            display:flex; align-items:center; justify-content:center; font-size:.65rem; font-weight:800;
            background:rgba(255,255,255,.04); }
        .hud-key .key.disabled { opacity:.3; }
        .hud-key .label { font-size:.5rem; color:var(--dim); text-transform:uppercase; }
        .hud-divider { width:1px; height:40px; background:var(--border); }
        .resource-bar { display:flex; flex-direction:column; gap:4px; width:180px; }
        .resource-row { display:flex; align-items:center; gap:8px; }
        .resource-label { font-size:.65rem; font-weight:800; width:24px; }
        .resource-track { flex:1; height:8px; background:rgba(255,255,255,.08); border-radius:4px; overflow:hidden; }
        .resource-fill { height:100%; border-radius:4px; transition:width .2s; }
        .resource-fill.sp { background:linear-gradient(90deg,#10b981,#34d399); }
        .resource-fill.up { background:linear-gradient(90deg,#f59e0b,#fbbf24); }
        .resource-val { font-size:.6rem; color:var(--muted); width:36px; text-align:right; }
        .combo-display { display:flex; flex-direction:column; align-items:center; }
        .combo-num { font-size:1.8rem; font-weight:900; line-height:1; }
        .combo-label { font-size:.5rem; color:var(--dim); text-transform:uppercase; letter-spacing:1px; }
        .charge-indicator { width:60px; height:4px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; margin-top:4px; }
        .charge-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--fire),#f97316); border-radius:2px; transition:width .05s linear; }

        /* === ANIMATIONS === */
        @keyframes popIn { 0%{transform:scale(0)} 70%{transform:scale(1.3)} 100%{transform:scale(1)} }
        @keyframes floatUp {
            0%{transform:translate(-50%,0) scale(.5);opacity:0}
            15%{transform:translate(-50%,-15px) scale(1.2);opacity:1}
            70%{transform:translate(-50%,-35px) scale(1);opacity:1}
            100%{transform:translate(-50%,-55px) scale(.8);opacity:0} }
        @keyframes pulseGlow { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 12px rgba(225,29,72,.3)} }
        @keyframes zoneAppear { 0%{opacity:0;transform:scale(.3)} 100%{opacity:.25;transform:scale(1)} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
        @keyframes attackLunge { 0%{transform:translateX(0) scale(1)} 20%{transform:translateX(60px) scale(1.15)} 40%{transform:translateX(60px) scale(1.15)} 100%{transform:translateX(0) scale(1)} }
        @keyframes enemyHit { 0%{filter:brightness(1)} 20%{filter:brightness(1.8)} 100%{filter:brightness(1)} }
        @keyframes frozen { 0%,100%{outline-offset:0} 50%{outline-offset:4px} }
    </style>
</head>
<body>
    <!-- TOP BAR -->
    <div class="top-bar">
        <h1><span>◆</span> 속성 반응 시스템 <span>PROTOTYPE</span></h1>
        <div class="char-slots" id="charSlots"></div>
        <div class="top-btns">
            <button onclick="resetAll()">↻ 리셋</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">
        <!-- LEFT: Log -->
        <div class="log-panel">
            <div class="log-header">◇ Combat Log</div>
            <div class="log-body" id="logBody"></div>
        </div>

        <!-- CENTER: Arena -->
        <div class="arena" id="arena">
            <div class="arena-bg"></div>
            <div class="arena-main" id="arenaMain">
                <div class="shape-container" id="playerContainer">
                    <div class="player-shape shape" id="playerShape"></div>
                    <div style="margin-top:8px;text-align:center;">
                        <div id="playerName" style="font-size:.75rem;font-weight:800;"></div>
                        <div id="playerElement" style="font-size:.6rem;color:var(--muted);"></div>
                    </div>
                </div>
                <div class="vs-divider">VS</div>
                <div class="shape-container" id="enemyContainer">
                    <div class="status-tray" id="statusTray"></div>
                    <div class="enemy-shape shape" id="enemyShape">
                        <div class="inner" id="enemyInner">ENEMY</div>
                    </div>
                    <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemyHpFill" style="width:100%"></div></div>
                    <div class="enemy-hp-text" id="enemyHpText">1000 / 1000</div>
                </div>
            </div>
        </div>

        <!-- RIGHT: Reaction Matrix -->
        <div class="matrix-panel">
            <div class="matrix-header">◇ Reaction Matrix</div>
            <div class="matrix-body" id="matrixBody"></div>
        </div>
    </div>

    <!-- BOTTOM HUD -->
    <div class="hud">
        <div class="combo-display">
            <div class="combo-num" id="comboNum" style="color:var(--physical)">0</div>
            <div class="combo-label">Combo</div>
            <div class="charge-indicator"><div class="charge-fill" id="chargeFill"></div></div>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-controls">
            <div class="hud-key"><div class="key">LMB</div><div class="label">공격</div></div>
            <div class="hud-key"><div class="key">Hold</div><div class="label">강공격</div></div>
            <div class="hud-key"><div class="key" id="keyE">E</div><div class="label">스킬</div></div>
            <div class="hud-key"><div class="key" id="keyQ">Q</div><div class="label">궁극기</div></div>
        </div>
        <div class="hud-divider"></div>
        <div class="resource-bar">
            <div class="resource-row">
                <div class="resource-label" style="color:#34d399">SP</div>
                <div class="resource-track"><div class="resource-fill sp" id="spFill" style="width:0%"></div></div>
                <div class="resource-val" id="spVal">0 / 50</div>
            </div>
            <div class="resource-row">
                <div class="resource-label" style="color:#fbbf24">UP</div>
                <div class="resource-track"><div class="resource-fill up" id="upFill" style="width:0%"></div></div>
                <div class="resource-val" id="upVal">0 / 50</div>
            </div>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-controls">
            <div class="hud-key"><div class="key">1-6</div><div class="label">교체</div></div>
        </div>
    </div>
    <script>
    // ======== CONFIG ========
    const CFG = {
        DMG: { combo: [10, 12, 18], charged: 25, skill: 35, ultBurst: 80, ultZoneTick: 10 },
        SP_MAX: 50, UP_MAX: 50,
        SP_GAIN: { combo: [1, 1, 3], charged: 5 },
        SKILL_COST: 10, SKILL_UP_GAIN: 10, ULT_COST: 25,
        ENEMY_HP: 1000, ENEMY_DEF: 10,
        GAUGE: { charged: 1.0, skill: 1.5, ult: 2.0, decay: 0.1 },
        COMBO_WINDOW: 800, CHARGE_TIME: 500,
        ZONE_DURATION: 10, ZONE_RADIUS: 150,
    };

    const ELEMENTS = {
        fire:    { name:'화', color:'#e11d48', key:'1', icon:'🔥' },
        water:   { name:'수', color:'#2563eb', key:'2', icon:'💧' },
        thunder: { name:'뇌', color:'#7c3aed', key:'3', icon:'⚡' },
        ice:     { name:'빙', color:'#60a5fa', key:'4', icon:'❄️' },
        light:   { name:'명', color:'#fcd34d', key:'5', icon:'✦' },
        dark:    { name:'암', color:'#6b7280', key:'6', icon:'◆' },
    };
    const EL_KEYS = Object.keys(ELEMENTS);

    const REACTIONS = [
        { id:'vaporize',  a:'fire',b:'water',   name:'기화',  nameEn:'Vaporize',   prio:5, mult:1.5, type:'instant', effect:'150% 증폭',       color:'#f97316' },
        { id:'melt',      a:'fire',b:'ice',     name:'융해',  nameEn:'Melt',       prio:5, mult:1.1, type:'instant', effect:'10% 증가',        color:'#fbbf24' },
        { id:'overheat',  a:'fire',b:'thunder', name:'과열',  nameEn:'Overheat',   prio:5, mult:2.0, type:'explosion',effect:'화속성 폭발',    color:'#dc2626' },
        { id:'freeze',    a:'water',b:'ice',    name:'빙결',  nameEn:'Freeze',     prio:1, mult:0,   type:'cc',      effect:'3초 행동불가 +20%',color:'#38bdf8' },
        { id:'electrify', a:'water',b:'thunder',name:'감전',  nameEn:'Electrify',  prio:5, mult:0.5, type:'dot',     effect:'4초 DoT',         color:'#8b5cf6' },
        { id:'embrittle', a:'thunder',b:'ice',  name:'파열',  nameEn:'Embrittle',  prio:5, mult:1.5, type:'defbreak',effect:'방어무시 150%',   color:'#6366f1' },
        { id:'corrosion', a:'_elem4',b:'dark',  name:'침식',  nameEn:'Corrosion',  prio:5, mult:2.5, type:'instant', effect:'대량 암속성',     color:'#374151' },
        { id:'gloss',     a:'_elem4',b:'light', name:'광채',  nameEn:'Gloss',      prio:4, mult:0,   type:'buff',    effect:'Gauge 2배',       color:'#fef08a' },
        { id:'chaos',     a:'light',b:'dark',   name:'혼돈',  nameEn:'Chaos',      prio:3, mult:0,   type:'transform',effect:'8초 혼돈 치환',  color:'#9f1239' },
        { id:'annihilation',a:'_chaos',b:'_elem4',name:'붕괴',nameEn:'Annihilation',prio:2,mult:3.0, type:'truedmg', effect:'방어/면역 무시',  color:'#f43f5e' },
    ];
    const ELEM4 = ['fire','water','thunder','ice'];

    // ======== STATE ========
    const state = {
        activeChar: 0,
        characters: EL_KEYS.map(el => ({ element: el, sp: 0, up: 0 })),
        enemy: { hp: CFG.ENEMY_HP, maxHp: CFG.ENEMY_HP, def: CFG.ENEMY_DEF,
                 stacks: [], frozen: false, frozenTimer: null, defDown: false, defDownTimer: null,
                 chaos: false, chaosTimer: null, dotTimers: [] },
        combo: 0, comboTimer: null,
        mouseDownTime: 0, isCharging: false, chargeInterval: null,
        zones: [],
        time: 0, timerInterval: null, gaugeInterval: null,
        logCount: 0,
    };

    // ======== HELPERS ========
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function curChar() { return state.characters[state.activeChar]; }
    function curElement() { return curChar().element; }
    function elColor(el) { return ELEMENTS[el]?.color || '#fff'; }
    function elName(el) { return ELEMENTS[el]?.name || el; }

    function calcDamage(raw) {
        let def = state.enemy.defDown ? 0 : state.enemy.def;
        return Math.max(1, Math.round(raw - def));
    }
    function calcDamageTrueDmg(raw) { return Math.round(raw); }

    // ======== REACTION ENGINE ========
    function findReaction(hostEl, triggerEl) {
        let matches = [];
        for (const rx of REACTIONS) {
            let match = false;
            if (rx.a === '_elem4' && rx.b === '_elem4') continue;
            if (rx.id === 'annihilation') {
                if (hostEl === 'chaos' && ELEM4.includes(triggerEl)) match = true;
            } else if (rx.a === '_elem4') {
                if (ELEM4.includes(hostEl) && triggerEl === rx.b) match = true;
            } else if (rx.b === '_elem4') {
                if (hostEl === rx.a && ELEM4.includes(triggerEl)) match = true;
            } else if (rx.a === '_chaos') {
                if (hostEl === 'chaos' && ELEM4.includes(triggerEl)) match = true;
            } else {
                if ((hostEl === rx.a && triggerEl === rx.b) || (hostEl === rx.b && triggerEl === rx.a)) match = true;
            }
            if (match) matches.push(rx);
        }
        matches.sort((a, b) => a.prio - b.prio);
        return matches[0] || null;
    }

    function resolveReactions(triggerEl, triggerDamage, gaugeAmount) {
        const enemy = state.enemy;
        if (enemy.chaos) {
            const rx = findReaction('chaos', triggerEl);
            if (rx) { executeReaction(rx, triggerDamage); return; }
        }
        let bestRx = null, bestHostIdx = -1;
        for (let i = 0; i < enemy.stacks.length; i++) {
            const rx = findReaction(enemy.stacks[i].element, triggerEl);
            if (rx && (!bestRx || rx.prio < bestRx.prio)) { bestRx = rx; bestHostIdx = i; }
        }
        if (bestRx) {
            executeReaction(bestRx, triggerDamage, bestHostIdx);
        } else if (triggerEl === 'light' || triggerEl === 'dark') {
            if (enemy.stacks.length === 0) {
                showPopup('부착 불가!', '#888', 'info');
                addLog(`${elName(triggerEl)} 속성 부착 불가 (단독 부착 불가)`, 'system');
            } else {
                let sameIdx = enemy.stacks.findIndex(s => s.element === triggerEl);
                if (sameIdx >= 0) {
                    enemy.stacks[sameIdx].gauge = clamp(enemy.stacks[sameIdx].gauge + gaugeAmount, 0, 5);
                    showPopup('강도 증가!', elColor(triggerEl), 'info');
                } else {
                    enemy.stacks.push({ element: triggerEl, gauge: gaugeAmount });
                    showPopup(`${elName(triggerEl)} 부착!`, elColor(triggerEl), 'info');
                    addLog(`${elName(triggerEl)} 속성 부착 (Gauge: ${gaugeAmount})`, 'damage');
                    for (let i = 0; i < enemy.stacks.length; i++) {
                        if (enemy.stacks[i].element !== triggerEl) {
                            const rx2 = findReaction(enemy.stacks[i].element, triggerEl);
                            if (rx2) { setTimeout(() => resolveReactions(triggerEl, 0, 0), 100); break; }
                        }
                    }
                }
            }
        } else {
            let sameIdx = enemy.stacks.findIndex(s => s.element === triggerEl);
            if (sameIdx >= 0) {
                enemy.stacks[sameIdx].gauge = clamp(enemy.stacks[sameIdx].gauge + gaugeAmount, 0, 5);
                showPopup('강도 증가!', elColor(triggerEl), 'info');
                addLog(`${elName(triggerEl)} 중복 부착 (Gauge: ${enemy.stacks[sameIdx].gauge.toFixed(1)})`, 'damage');
            } else {
                enemy.stacks.push({ element: triggerEl, gauge: gaugeAmount });
                showPopup(`${elName(triggerEl)} 부착!`, elColor(triggerEl), 'info');
                addLog(`${elName(triggerEl)} 속성 부착 (Gauge: ${gaugeAmount})`, 'damage');
            }
        }
        updateUI();
    }

    function executeReaction(rx, triggerDamage, hostIdx) {
        const enemy = state.enemy;
        addLog(`⚡ ${rx.name} (${rx.nameEn}) 발동!`, 'reaction');
        flashMatrixCard(rx.id);
        switch (rx.type) {
            case 'instant': {
                const dmg = calcDamage(triggerDamage * rx.mult);
                applyDamage(dmg);
                showPopup(`${rx.name}! ${dmg}`, rx.color, 'big');
                shakeEnemy();
                if (hostIdx >= 0) enemy.stacks.splice(hostIdx, 1);
                let trigIdx = enemy.stacks.findIndex(s => s.element === (rx.b === '_elem4' ? undefined : rx.b));
                if (rx.id === 'corrosion') enemy.stacks = [];
                else if (trigIdx >= 0) enemy.stacks.splice(trigIdx, 1);
                break;
            }
            case 'explosion': {
                const dmg = calcDamage(CFG.DMG.combo[0] * rx.mult);
                applyDamage(dmg);
                showPopup(`${rx.name}! ${dmg}`, rx.color, 'big');
                shakeEnemy(); shakeScreen();
                enemy.stacks = [];
                break;
            }
            case 'cc': {
                enemy.frozen = true;
                showPopup('빙결! 3초', rx.color, 'big');
                clearTimeout(enemy.frozenTimer);
                enemy.frozenTimer = setTimeout(() => { enemy.frozen = false; addLog('빙결 해제', 'system'); updateUI(); }, 3000);
                if (hostIdx >= 0) enemy.stacks.splice(hostIdx, 1);
                break;
            }
            case 'dot': {
                showPopup(`${rx.name}! DoT 4틱`, rx.color, 'big');
                let ticks = 0;
                const dotId = setInterval(() => {
                    if (++ticks > 4) { clearInterval(dotId); return; }
                    const dmg = calcDamage(CFG.DMG.combo[0] * rx.mult);
                    applyDamage(dmg);
                    showPopup(`감전 ${dmg}`, rx.color, 'normal');
                    addLog(`감전 ${ticks}틱: ${dmg} 피해`, 'damage');
                    updateUI();
                }, 1000);
                if (hostIdx >= 0) enemy.stacks.splice(hostIdx, 1);
                break;
            }
            case 'defbreak': {
                const dmg = calcDamageTrueDmg(triggerDamage * rx.mult);
                applyDamage(dmg);
                showPopup(`${rx.name}! ${dmg}`, rx.color, 'big');
                enemy.defDown = true;
                clearTimeout(enemy.defDownTimer);
                enemy.defDownTimer = setTimeout(() => { enemy.defDown = false; addLog('방어 감소 해제', 'system'); updateUI(); }, 3000);
                if (hostIdx >= 0) enemy.stacks.splice(hostIdx, 1);
                shakeEnemy();
                break;
            }
            case 'buff': {
                if (hostIdx >= 0) {
                    enemy.stacks[hostIdx].gauge *= 2;
                    showPopup(`${rx.name}! Gauge 2×`, rx.color, 'big');
                    addLog(`${elName(enemy.stacks[hostIdx].element)} Gauge 2배 증폭`, 'reaction');
                }
                let lightIdx = enemy.stacks.findIndex(s => s.element === 'light');
                if (lightIdx >= 0) enemy.stacks.splice(lightIdx, 1);
                break;
            }
            case 'transform': {
                enemy.chaos = true;
                enemy.stacks = [];
                showPopup('혼돈! 8초', rx.color, 'big');
                shakeEnemy();
                clearTimeout(enemy.chaosTimer);
                enemy.chaosTimer = setTimeout(() => { enemy.chaos = false; addLog('혼돈 상태 해제', 'system'); updateUI(); }, 8000);
                break;
            }
            case 'truedmg': {
                const dmg = calcDamageTrueDmg(CFG.DMG.combo[0] * rx.mult);
                applyDamage(dmg);
                showPopup(`💥 ${rx.name}! ${dmg}`, rx.color, 'big');
                enemy.chaos = false; clearTimeout(enemy.chaosTimer);
                enemy.stacks = [];
                shakeEnemy(); shakeScreen();
                break;
            }
        }
        updateUI();
    }

    function applyDamage(dmg) {
        state.enemy.hp = clamp(state.enemy.hp - dmg, 0, state.enemy.maxHp);
        if (state.enemy.hp <= 0) {
            addLog('적 처치! 자동 부활합니다.', 'system');
            setTimeout(() => { state.enemy.hp = state.enemy.maxHp; state.enemy.stacks = [];
                state.enemy.frozen = false; state.enemy.chaos = false; updateUI(); }, 1500);
        }
    }

    // ======== COMBAT ACTIONS ========
    function doComboAttack() {
        const c = state.combo;
        const dmg = calcDamage(CFG.DMG.combo[c]);
        const spGain = CFG.SP_GAIN.combo[c];
        applyDamage(dmg);
        curChar().sp = clamp(curChar().sp + spGain, 0, CFG.SP_MAX);
        showPopup(`${dmg}`, '#ccc', 'normal');
        addLog(`콤보 ${c + 1}타: ${dmg} 물리 피해 (SP +${spGain})`, 'damage');
        animateAttack();
        state.combo = (c + 1) % 3;
        clearTimeout(state.comboTimer);
        state.comboTimer = setTimeout(() => { state.combo = 0; updateUI(); }, CFG.COMBO_WINDOW);
        updateUI();
    }

    function doChargedAttack() {
        const el = curElement();
        const dmg = calcDamage(CFG.DMG.charged);
        const frozen = state.enemy.frozen;
        const finalDmg = frozen ? Math.round(dmg * 1.2) : dmg;
        applyDamage(finalDmg);
        curChar().sp = clamp(curChar().sp + CFG.SP_GAIN.charged, 0, CFG.SP_MAX);
        showPopup(`${finalDmg}`, elColor(el), 'normal');
        addLog(`강공격: ${finalDmg} ${elName(el)} 피해 (SP +${CFG.SP_GAIN.charged})${frozen ? ' [쇄빙+20%]' : ''}`, 'damage');
        animateAttack();
        resolveReactions(el, CFG.DMG.charged, CFG.GAUGE.charged);
        state.combo = 0;
        updateUI();
    }

    function doSkill() {
        const ch = curChar();
        if (ch.sp < CFG.SKILL_COST) return;
        ch.sp -= CFG.SKILL_COST;
        ch.up = clamp(ch.up + CFG.SKILL_UP_GAIN, 0, CFG.UP_MAX);
        const el = curElement();
        const frozen = state.enemy.frozen;
        const dmg = calcDamage(CFG.DMG.skill);
        const finalDmg = frozen ? Math.round(dmg * 1.2) : dmg;
        applyDamage(finalDmg);
        showPopup(`E ${finalDmg}`, elColor(el), 'big');
        addLog(`속성 스킬: ${finalDmg} ${elName(el)} 피해 (SP -${CFG.SKILL_COST}, UP +${CFG.SKILL_UP_GAIN})`, 'damage');
        animateAttack();
        resolveReactions(el, CFG.DMG.skill, CFG.GAUGE.skill);
        state.combo = 0;
        updateUI();
    }

    function doUltimate() {
        const ch = curChar();
        if (ch.up < CFG.ULT_COST) return;
        ch.up -= CFG.ULT_COST;
        const el = curElement();
        if (el === 'light' || el === 'dark') {
            createZone(el);
            showPopup(`Q 영역 생성!`, elColor(el), 'big');
            addLog(`궁극기: ${elName(el)} 영역 생성 (10초, UP -${CFG.ULT_COST})`, 'reaction');
        } else {
            const frozen = state.enemy.frozen;
            const dmg = calcDamage(CFG.DMG.ultBurst);
            const finalDmg = frozen ? Math.round(dmg * 1.2) : dmg;
            applyDamage(finalDmg);
            showPopup(`Q ${finalDmg}`, elColor(el), 'big');
            addLog(`궁극기: ${finalDmg} ${elName(el)} 피해 (UP -${CFG.ULT_COST})`, 'damage');
            shakeScreen();
            resolveReactions(el, CFG.DMG.ultBurst, CFG.GAUGE.ult);
        }
        animateAttack();
        state.combo = 0;
        updateUI();
    }

    // ======== ZONE SYSTEM ========
    function createZone(element) {
        const zone = { element, remaining: CFG.ZONE_DURATION, el: null };
        state.zones.push(zone);
        const container = document.getElementById('enemyContainer');
        const div = document.createElement('div');
        div.className = 'zone-overlay';
        div.style.cssText = `width:${CFG.ZONE_RADIUS * 2}px;height:${CFG.ZONE_RADIUS * 2}px;
            left:50%;top:50%;margin-left:-${CFG.ZONE_RADIUS}px;margin-top:-${CFG.ZONE_RADIUS}px;
            background:radial-gradient(circle,${elColor(element)}44,transparent 70%);
            border:2px solid ${elColor(element)}66;`;
        const timerEl = document.createElement('div');
        timerEl.className = 'zone-timer';
        timerEl.textContent = `${zone.remaining}s`;
        div.appendChild(timerEl);
        container.appendChild(div);
        zone.el = div;
        zone.timerEl = timerEl;
        const tickId = setInterval(() => {
            zone.remaining--;
            if (zone.remaining <= 0) {
                clearInterval(tickId);
                div.remove();
                state.zones = state.zones.filter(z => z !== zone);
                addLog(`${elName(element)} 영역 소멸`, 'system');
                updateUI();
                return;
            }
            timerEl.textContent = `${zone.remaining}s`;
            const dmg = calcDamage(CFG.DMG.ultZoneTick);
            applyDamage(dmg);
            showPopup(`${dmg}`, elColor(element), 'info');
            addLog(`${elName(element)} 영역: ${dmg} 피해`, 'damage');
            resolveReactions(element, CFG.DMG.ultZoneTick, 0.3);
            updateUI();
        }, 1000);
    }

    // ======== GAUGE DECAY ========
    function startGaugeDecay() {
        state.gaugeInterval = setInterval(() => {
            const enemy = state.enemy;
            for (let i = enemy.stacks.length - 1; i >= 0; i--) {
                enemy.stacks[i].gauge -= CFG.GAUGE.decay;
                if (enemy.stacks[i].gauge <= 0) {
                    addLog(`${elName(enemy.stacks[i].element)} 부착 자연 소멸`, 'system');
                    enemy.stacks.splice(i, 1);
                }
            }
            updateUI();
        }, 1000);
    }

    // ======== UI & VISUALS ========
    function showPopup(text, color, size) {
        const el = document.createElement('div');
        el.className = `dmg-popup ${size}`;
        el.textContent = text;
        el.style.color = color;
        el.style.left = '50%';
        el.style.top = `${30 + Math.random() * 20}%`;
        document.getElementById('enemyContainer').appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    function animateAttack() {
        const p = document.getElementById('playerContainer');
        p.style.animation = 'none'; void p.offsetWidth;
        p.style.animation = 'attackLunge .4s cubic-bezier(.2,.8,.2,1)';
        setTimeout(() => {
            const e = document.getElementById('enemyShape');
            e.style.animation = 'none'; void e.offsetWidth;
            e.style.animation = 'enemyHit .3s';
        }, 100);
    }
    function shakeEnemy() {
        const e = document.getElementById('enemyContainer');
        e.style.animation = 'none'; void e.offsetWidth;
        e.style.animation = 'shake .4s';
    }
    function shakeScreen() {
        const a = document.getElementById('arena');
        a.style.animation = 'none'; void a.offsetWidth;
        a.style.animation = 'shake .3s';
    }

    function addLog(msg, type) {
        const body = document.getElementById('logBody');
        const div = document.createElement('div');
        div.className = `log-entry ${type}`;
        const t = new Date();
        div.innerHTML = `<span class="time">${t.getMinutes().toString().padStart(2,'0')}:${t.getSeconds().toString().padStart(2,'0')}</span>${msg}`;
        body.appendChild(div);
        body.scrollTop = body.scrollHeight;
        if (body.children.length > 200) body.firstChild.remove();
    }

    function flashMatrixCard(rxId) {
        const card = document.querySelector(`[data-rx="${rxId}"]`);
        if (card) { card.classList.remove('active'); void card.offsetWidth; card.classList.add('active');
            setTimeout(() => card.classList.remove('active'), 600); }
    }

    function updateUI() {
        const ch = curChar();
        const el = curElement();
        // Player shape
        const ps = document.getElementById('playerShape');
        ps.style.background = `linear-gradient(135deg, ${elColor(el)}cc, ${elColor(el)}66)`;
        ps.style.boxShadow = `0 0 20px ${elColor(el)}44`;
        ps.textContent = ELEMENTS[el].icon;
        document.getElementById('playerName').textContent = `${ELEMENTS[el].name} 캐릭터`;
        document.getElementById('playerName').style.color = elColor(el);
        document.getElementById('playerElement').textContent = `[${ELEMENTS[el].key}] ${el.toUpperCase()}`;
        // Enemy
        const enemy = state.enemy;
        document.getElementById('enemyHpFill').style.width = `${(enemy.hp / enemy.maxHp) * 100}%`;
        document.getElementById('enemyHpText').textContent = `${enemy.hp} / ${enemy.maxHp}`;
        const es = document.getElementById('enemyShape');
        if (enemy.frozen) { es.style.background = '#38bdf8'; es.style.outline = '3px solid #7dd3fc'; es.style.outlineOffset = '4px'; }
        else if (enemy.chaos) { es.style.background = `linear-gradient(135deg, #9f1239, #881337)`; es.style.outline = '3px solid #f43f5e'; es.style.outlineOffset = '4px'; }
        else { es.style.background = 'linear-gradient(135deg, #1f2937, #374151)'; es.style.outline = 'none'; }
        if (enemy.defDown) es.style.boxShadow = '0 0 20px #6366f1';
        else es.style.boxShadow = 'none';
        document.getElementById('enemyInner').textContent = enemy.frozen ? '❄️ FROZEN' : enemy.chaos ? '🌀 CHAOS' : 'ENEMY';
        // Status tray
        const tray = document.getElementById('statusTray');
        tray.innerHTML = '';
        enemy.stacks.forEach(s => {
            const badge = document.createElement('div');
            badge.className = 'status-badge';
            badge.style.background = elColor(s.element);
            badge.style.color = (s.element === 'light' || s.element === 'ice') ? '#000' : '#fff';
            badge.innerHTML = `${elName(s.element)}<div class="gauge-bar"><div class="gauge-fill" style="width:${(s.gauge / 5) * 100}%;background:${elColor(s.element)}"></div></div>`;
            tray.appendChild(badge);
        });
        if (enemy.chaos) {
            const badge = document.createElement('div');
            badge.className = 'status-badge';
            badge.style.background = '#9f1239';
            badge.textContent = '혼돈';
            tray.appendChild(badge);
        }
        // SP/UP
        document.getElementById('spFill').style.width = `${(ch.sp / CFG.SP_MAX) * 100}%`;
        document.getElementById('upFill').style.width = `${(ch.up / CFG.UP_MAX) * 100}%`;
        document.getElementById('spVal').textContent = `${ch.sp} / ${CFG.SP_MAX}`;
        document.getElementById('upVal').textContent = `${ch.up} / ${CFG.UP_MAX}`;
        document.getElementById('keyE').classList.toggle('disabled', ch.sp < CFG.SKILL_COST);
        document.getElementById('keyQ').classList.toggle('disabled', ch.up < CFG.ULT_COST);
        // Combo
        document.getElementById('comboNum').textContent = state.combo;
        document.getElementById('comboNum').style.color = state.combo > 0 ? elColor(el) : 'var(--physical)';
        // Char slots
        document.querySelectorAll('.char-slot').forEach((slot, i) => {
            slot.classList.toggle('active', i === state.activeChar);
        });
        // Matrix highlight
        updateMatrixHighlights();
    }

    function updateMatrixHighlights() {
        const hostEls = state.enemy.stacks.map(s => s.element);
        if (state.enemy.chaos) hostEls.push('chaos');
        document.querySelectorAll('.rx-card').forEach(card => {
            const rxId = card.dataset.rx;
            const rx = REACTIONS.find(r => r.id === rxId);
            if (!rx) return;
            let possible = false;
            for (const h of hostEls) {
                if (findReaction(h, curElement())?.id === rxId) possible = true;
            }
            card.classList.toggle('possible', possible);
        });
    }

    // ======== INIT UI ========
    function initCharSlots() {
        const container = document.getElementById('charSlots');
        EL_KEYS.forEach((el, i) => {
            const slot = document.createElement('div');
            slot.className = 'char-slot';
            slot.style.color = elColor(el);
            slot.innerHTML = `${ELEMENTS[el].icon}<span class="key-hint">${i + 1}</span>`;
            slot.onclick = () => switchChar(i);
            container.appendChild(slot);
        });
    }

    function initMatrix() {
        const body = document.getElementById('matrixBody');
        REACTIONS.forEach(rx => {
            const card = document.createElement('div');
            card.className = 'rx-card';
            card.dataset.rx = rx.id;
            let formula = '';
            if (rx.a === '_elem4') formula = `원소4종 + ${elName(rx.b)}`;
            else if (rx.b === '_elem4') formula = `${rx.a === '_chaos' ? '혼돈' : elName(rx.a)} + 원소4종`;
            else formula = `${elName(rx.a)} ↔ ${elName(rx.b)}`;
            card.innerHTML = `<span class="rx-priority">P${rx.prio}</span>
                <div class="rx-name" style="color:${rx.color}">${rx.name} (${rx.nameEn})</div>
                <div class="rx-formula">${formula}</div>
                <div class="rx-effect">${rx.effect}</div>`;
            body.appendChild(card);
        });
    }

    function switchChar(idx) {
        state.activeChar = idx;
        state.combo = 0;
        addLog(`캐릭터 교체: ${elName(curElement())}`, 'system');
        updateUI();
    }

    function resetAll() {
        state.enemy.hp = CFG.ENEMY_HP;
        state.enemy.stacks = [];
        state.enemy.frozen = false; state.enemy.chaos = false;
        state.enemy.defDown = false;
        clearTimeout(state.enemy.frozenTimer);
        clearTimeout(state.enemy.chaosTimer);
        clearTimeout(state.enemy.defDownTimer);
        state.characters.forEach(c => { c.sp = 0; c.up = 0; });
        state.combo = 0;
        state.zones.forEach(z => z.el?.remove());
        state.zones = [];
        document.getElementById('logBody').innerHTML = '';
        addLog('시스템 리셋 완료', 'system');
        updateUI();
    }

    // ======== INPUT HANDLING ========
    function setupInput() {
        const arena = document.getElementById('arenaMain');
        arena.addEventListener('mousedown', e => {
            if (e.button !== 0) return;
            state.mouseDownTime = Date.now();
            state.isCharging = false;
            state.chargeInterval = setInterval(() => {
                const elapsed = Date.now() - state.mouseDownTime;
                const pct = clamp((elapsed / CFG.CHARGE_TIME) * 100, 0, 100);
                document.getElementById('chargeFill').style.width = `${pct}%`;
                if (elapsed >= CFG.CHARGE_TIME) state.isCharging = true;
            }, 30);
        });
        arena.addEventListener('mouseup', e => {
            if (e.button !== 0) return;
            clearInterval(state.chargeInterval);
            document.getElementById('chargeFill').style.width = '0%';
            if (state.isCharging) {
                doChargedAttack();
            } else {
                doComboAttack();
            }
            state.isCharging = false;
        });
        arena.addEventListener('mouseleave', () => {
            clearInterval(state.chargeInterval);
            document.getElementById('chargeFill').style.width = '0%';
            state.isCharging = false;
        });
        document.addEventListener('keydown', e => {
            if (e.repeat) return;
            const k = e.key.toLowerCase();
            if (k >= '1' && k <= '6') switchChar(parseInt(k) - 1);
            else if (k === 'e') doSkill();
            else if (k === 'q') doUltimate();
        });
        arena.addEventListener('contextmenu', e => e.preventDefault());
    }

    // ======== BOOT ========
    function init() {
        initCharSlots();
        initMatrix();
        setupInput();
        startGaugeDecay();
        addLog('속성 반응 시스템 프로토타입 시작', 'system');
        addLog('마우스 좌클릭: 물리 공격 | 홀드: 강공격', 'system');
        addLog('E: 속성 스킬 | Q: 궁극기 | 1~6: 캐릭터 교체', 'system');
        updateUI();
    }
    init();
    </script>
</body>
</html>
